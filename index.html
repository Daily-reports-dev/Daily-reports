<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <meta name="theme-color" content="#0f6e56">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="تۆماری نەخۆشی">
  <link rel="manifest" href="manifest.json">
  <title>تۆماری نەخۆشی - وەزارەتی تەندروستی</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #0f6e56;
      --primary-dark: #0a4d3b;
      --primary-light: #e1f5ee;
      --male: #185fa5;
      --male-light: #e6f1fb;
      --female: #b33a6a;
      --female-light: #fde8f0;
      --danger: #a32d2d;
      --bg-main: #ffffff;
      --bg-secondary: #f8f7f4;
      --text-primary: #1c1c1a;
      --text-secondary: #5f5e5a;
      --border-light: rgba(0,0,0,0.08);
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
      --radius-md: 10px;
      --radius-lg: 16px;
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 12px;
      --spacing-lg: 16px;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg-main);
      color: var(--text-primary);
      line-height: 1.4;
    }

    /* App Container - Mobile First */
    #app {
      max-width: 100%;
      margin: 0;
      padding: var(--spacing-sm);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Header */
    .app-header {
      background: var(--primary);
      color: white;
      padding: var(--spacing-md);
      border-radius: var(--radius-lg);
      margin-bottom: var(--spacing-md);
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow-sm);
    }

    .app-title {
      font-size: 16px;
      font-weight: 700;
    }

    .app-date {
      font-size: 14px;
      background: rgba(255,255,255,0.2);
      padding: 4px 12px;
      border-radius: 20px;
    }

    /* Stats Row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      margin-bottom: var(--spacing-md);
    }

    .stat-box {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 6px 2px;
      text-align: center;
      border: 1px solid var(--border-light);
    }

    .stat-value {
      font-size: 16px;
      font-weight: 800;
      color: var(--primary);
    }

    .stat-label {
      font-size: 9px;
      color: var(--text-secondary);
    }

    /* Disease Grid - 2 columns for mobile */
    .disease-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
      margin-bottom: var(--spacing-md);
    }

    .disease-card {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 8px 4px;
      border: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .disease-card.active {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .disease-icon {
      font-size: 20px;
      width: 32px;
      height: 32px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .disease-info {
      flex: 1;
    }

    .disease-name {
      font-size: 12px;
      font-weight: 600;
    }

    .disease-count {
      font-size: 10px;
      color: var(--text-secondary);
    }

    .disease-badge {
      background: var(--primary);
      color: white;
      padding: 2px 6px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 700;
      margin-right: 4px;
    }

    /* Age Section - Compact for mobile */
    .age-section {
      background: white;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-light);
      padding: var(--spacing-sm);
      margin-bottom: var(--spacing-md);
      animation: fadeIn 0.2s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .selected-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 8px;
      margin-bottom: 8px;
      border-bottom: 2px solid var(--primary-light);
    }

    .selected-icon {
      font-size: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--primary-light);
    }

    .selected-info h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--primary);
    }

    .close-btn {
      margin-right: auto;
      background: none;
      border: none;
      font-size: 20px;
      color: var(--text-secondary);
      padding: 4px 8px;
      cursor: pointer;
    }

    /* Age Grid - 2 columns for mobile */
    .age-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
    }

    .age-item {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-light);
      overflow: hidden;
    }

    .age-header {
      background: var(--bg-secondary);
      padding: 4px 2px;
      text-align: center;
      border-bottom: 1px solid var(--border-light);
    }

    .age-label {
      font-weight: 700;
      font-size: 12px;
    }

    .age-sub {
      font-size: 8px;
      color: var(--text-secondary);
    }

    /* Gender row - very compact */
    .gender-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 6px;
      border-bottom: 1px solid var(--border-light);
    }

    .gender-row:last-child {
      border-bottom: none;
    }

    .gender-badge {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .gender-icon {
      font-size: 14px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gender-icon.male {
      background: var(--male-light);
      color: var(--male);
    }

    .gender-icon.female {
      background: var(--female-light);
      color: var(--female);
    }

    .gender-count {
      font-size: 14px;
      font-weight: 700;
      min-width: 24px;
      text-align: center;
    }

    /* Controls - very compact */
    .gender-controls {
      display: flex;
      gap: 2px;
    }

    .ctrl-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1px solid var(--border-light);
      background: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      transition: all 0.2s;
    }

    .ctrl-btn:active {
      transform: scale(0.9);
      background: var(--primary-light);
    }

    .ctrl-btn.delete:active {
      background: var(--danger);
      color: white;
    }

    /* Age total */
    .age-total {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 8px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-light);
      font-size: 11px;
      font-weight: 600;
    }

    .total-value {
      color: var(--primary);
      font-size: 13px;
    }

    /* Log Section */
    .log-section {
      margin-top: auto;
    }

    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .log-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--primary);
    }

    .log-total {
      background: var(--primary-light);
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      color: var(--primary);
    }

    .log-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 150px;
      overflow-y: auto;
    }

    .log-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      background: white;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-light);
      font-size: 12px;
    }

    .log-item-info {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .log-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .log-details p {
      font-size: 10px;
      color: var(--text-secondary);
    }

    .log-count {
      font-size: 14px;
      font-weight: 700;
      color: var(--primary);
    }

    /* Bottom Actions */
    .bottom-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: var(--spacing-sm);
    }

    .action-btn {
      padding: 10px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-light);
      background: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .action-btn.primary {
      background: var(--primary);
      color: white;
      border: none;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--text-primary);
      color: white;
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 13px;
      z-index: 9999;
      transition: transform 0.3s;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* Modal */
    .modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .modal.show {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: white;
      border-radius: var(--radius-lg);
      padding: 20px;
      width: 90%;
      max-width: 320px;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Simple Header -->
    <div class="app-header">
      <span class="app-title">🏥 تۆماری نەخۆشی</span>
      <span class="app-date" id="currentDateDisplay"></span>
    </div>

    <!-- Stats Row -->
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-value" id="todayTotal">٠</div>
        <div class="stat-label">ئەمڕۆ</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="weekTotal">٠</div>
        <div class="stat-label">هەفتە</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="monthTotal">٠</div>
        <div class="stat-label">مانگ</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="yearTotal">٠</div>
        <div class="stat-label">ساڵ</div>
      </div>
    </div>

    <!-- Main Content -->
    <div id="mainContent"></div>

    <!-- Bottom Actions -->
    <div class="bottom-actions">
      <button class="action-btn" onclick="changeDate(-1)">‹ ڕۆژی پێشوو</button>
      <button class="action-btn" onclick="changeDate(1)">ڕۆژی داهاتوو ›</button>
      <button class="action-btn primary" onclick="showQuickEntryModal()">⚡ خێرا</button>
      <button class="action-btn" onclick="exportDaily()">📥 هەناردە</button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-content" id="modalContent"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where, Timestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAdJpXXA0U68hTiCee5Yvmn5isa2MWRmVg",
      authDomain: "daily-reports-5d85d.firebaseapp.com",
      projectId: "daily-reports-5d85d",
      storageBucket: "daily-reports-5d85d.firebasestorage.app",
      messagingSenderId: "531833916190",
      appId: "1:531833916190:web:652f12cdb41a74b381970f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Data
    const DISEASES = [
      { id: 'malaria', name: 'ئاکەڵی', icon: '🦟', color: '#E85D24' },
      { id: 'typhoid', name: 'تیفۆیید', icon: '🌡️', color: '#BA7517' },
      { id: 'tb', name: 'سل', icon: '🫁', color: '#534AB7' },
      { id: 'cholera', name: 'کولێرا', icon: '💧', color: '#0F6E56' },
      { id: 'bloody', name: 'خوێناوی', icon: '🩸', color: '#A32D2D' },
      { id: 'hepatitisA', name: 'هەپاتایتس', icon: '🩺', color: '#185FA5' },
      { id: 'covid', name: 'کۆڤید', icon: '🦠', color: '#3B6D11' },
      { id: 'measles', name: 'قیژنە', icon: '🤒', color: '#993556' }
    ];

    const AGE_GROUPS = [
      { id: 'lt1', label: '<١', sub: 'ساڵ' },
      { id: 'a1_4', label: '١-٤', sub: 'ساڵ' },
      { id: 'a5_14', label: '٥-١٤', sub: 'ساڵ' },
      { id: 'a15_24', label: '١٥-٢٤', sub: 'ساڵ' },
      { id: 'a25_44', label: '٢٥-٤٤', sub: 'ساڵ' },
      { id: 'a45_64', label: '٤٥-٦٤', sub: 'ساڵ' },
      { id: 'gte65', label: '٦٥+', sub: 'ساڵ' }
    ];

    // State
    let currentUser = null;
    let todayRecords = [];
    let weekRecords = [];
    let selectedDate = new Date();
    let selectedDisease = null;

    // Helper Functions
    function formatDate(date) {
      const months = ['١', '٢', '٣', '٤', '٥', '٦', '٧', '٨', '٩', '١٠', '١١', '١٢'];
      return `${date.getDate()}/${months[date.getMonth()]}/${date.getFullYear()}`;
    }

    function showToast(msg, type = 'info') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `toast show ${type}`;
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // Authentication
    async function login() {
      try {
        const result = await signInWithPopup(auth, provider);
        currentUser = result.user;
        loadData();
        showToast(`بەخێربێیت ${currentUser.displayName}`, 'success');
      } catch (error) {
        showToast('هەڵە لە چوونەژوورەوە', 'error');
      }
    }

    // Load Data
    async function loadData() {
      if (!currentUser) return;
      
      try {
        const todayStr = selectedDate.toISOString().split('T')[0];
        const todayQuery = query(collection(db, 'daily_records'), where('date', '==', todayStr));
        const todaySnapshot = await getDocs(todayQuery);
        todayRecords = todaySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

        const weekQuery = query(
          collection(db, 'daily_records'),
          where('week', '==', getWeekNumber(selectedDate)),
          where('year', '==', selectedDate.getFullYear())
        );
        const weekSnapshot = await getDocs(weekQuery);
        weekRecords = weekSnapshot.docs.map(doc => doc.data());

        updateStats();
        renderDailyPage();
      } catch (error) {
        console.error(error);
      }
    }

    function getWeekNumber(date) {
      const firstDayOfYear = new Date(date.getFullYear(), 0, 1);
      const pastDays = (date - firstDayOfYear) / 86400000;
      return Math.ceil((pastDays + firstDayOfYear.getDay() + 1) / 7);
    }

    function updateStats() {
      document.getElementById('todayTotal').textContent = todayRecords.length;
      document.getElementById('weekTotal').textContent = weekRecords.length;
      document.getElementById('monthTotal').textContent = weekRecords.filter(r => 
        new Date(r.date).getMonth() === selectedDate.getMonth()
      ).length;
      document.getElementById('yearTotal').textContent = weekRecords.length;
      document.getElementById('currentDateDisplay').textContent = formatDate(selectedDate);
    }

    // Render Functions
    function renderDailyPage() {
      const main = document.getElementById('mainContent');
      
      main.innerHTML = `
        <!-- Disease Grid -->
        <div class="disease-grid">
          ${DISEASES.map(d => {
            const count = todayRecords.filter(r => r.disease === d.id).length;
            return `
              <div class="disease-card ${selectedDisease === d.id ? 'active' : ''}" 
                   onclick="selectDisease('${d.id}')">
                <span class="disease-icon">${d.icon}</span>
                <div class="disease-info">
                  <div class="disease-name">${d.name}</div>
                  <div class="disease-count">${count} تۆمار</div>
                </div>
                ${count > 0 ? `<span class="disease-badge">${count}</span>` : ''}
              </div>
            `;
          }).join('')}
        </div>

        ${selectedDisease ? renderAgeSection(selectedDisease) : ''}

        <!-- Today's Log -->
        <div class="log-section">
          <div class="log-header">
            <span class="log-title">📋 تۆمارەکانی ئەمڕۆ</span>
            <span class="log-total">${todayRecords.length}</span>
          </div>
          <div class="log-list" id="todayLogList">
            ${renderTodayLog()}
          </div>
        </div>
      `;
    }

    function renderAgeSection(diseaseId) {
      const disease = DISEASES.find(d => d.id === diseaseId);
      
      return `
        <div class="age-section">
          <div class="selected-header">
            <span class="selected-icon">${disease.icon}</span>
            <div class="selected-info">
              <h3>${disease.name}</h3>
            </div>
            <button class="close-btn" onclick="selectDisease(null)">✕</button>
          </div>

          <div class="age-grid">
            ${AGE_GROUPS.map(age => {
              const maleCount = todayRecords.filter(r => 
                r.disease === diseaseId && r.ageGroup === age.id && r.gender === 'male'
              ).length;
              const femaleCount = todayRecords.filter(r => 
                r.disease === diseaseId && r.ageGroup === age.id && r.gender === 'female'
              ).length;
              
              return `
                <div class="age-item">
                  <div class="age-header">
                    <span class="age-label">${age.label}</span>
                    <span class="age-sub">${age.sub}</span>
                  </div>
                  
                  <!-- Male -->
                  <div class="gender-row">
                    <div class="gender-badge">
                      <span class="gender-icon male">👨</span>
                      <span class="gender-count" id="count-${diseaseId}-${age.id}-male">${maleCount}</span>
                    </div>
                    <div class="gender-controls">
                      <button class="ctrl-btn" onclick="addRecord('${diseaseId}', '${age.id}', 'male')">+</button>
                      <button class="ctrl-btn" onclick="decrementCount('${diseaseId}', '${age.id}', 'male')">-</button>
                    </div>
                  </div>

                  <!-- Female -->
                  <div class="gender-row">
                    <div class="gender-badge">
                      <span class="gender-icon female">👩</span>
                      <span class="gender-count" id="count-${diseaseId}-${age.id}-female">${femaleCount}</span>
                    </div>
                    <div class="gender-controls">
                      <button class="ctrl-btn" onclick="addRecord('${diseaseId}', '${age.id}', 'female')">+</button>
                      <button class="ctrl-btn" onclick="decrementCount('${diseaseId}', '${age.id}', 'female')">-</button>
                    </div>
                  </div>

                  <!-- Total -->
                  <div class="age-total">
                    <span>کۆی گشتی</span>
                    <span class="total-value" id="total-${diseaseId}-${age.id}">${maleCount + femaleCount}</span>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }

    function renderTodayLog() {
      if (todayRecords.length === 0) {
        return '<div style="text-align:center;padding:20px;color:var(--text-secondary)">هیچ تۆمارێک نیە</div>';
      }

      const grouped = {};
      todayRecords.forEach(record => {
        const key = `${record.disease}-${record.ageGroup}-${record.gender}`;
        if (!grouped[key]) {
          grouped[key] = {
            disease: DISEASES.find(d => d.id === record.disease),
            ageGroup: AGE_GROUPS.find(a => a.id === record.ageGroup),
            gender: record.gender,
            count: 0
          };
        }
        grouped[key].count++;
      });

      return Object.values(grouped).map(group => `
        <div class="log-item">
          <div class="log-item-info">
            <span class="log-dot" style="background:${group.disease.color}"></span>
            <div>
              <strong>${group.disease.icon} ${group.disease.name}</strong>
              <p>${group.gender === 'male' ? '👨 نێر' : '👩 مێ'} - ${group.ageGroup.label}</p>
            </div>
          </div>
          <span class="log-count">${group.count}</span>
        </div>
      `).join('');
    }

    // Actions
    window.selectDisease = function(diseaseId) {
      selectedDisease = diseaseId;
      renderDailyPage();
    };

    window.addRecord = async function(diseaseId, ageGroupId, genderId) {
      if (!currentUser) {
        showToast('سەرەتا بچۆرە ژوورەوە', 'error');
        return;
      }

      const disease = DISEASES.find(d => d.id === diseaseId);
      const ageGroup = AGE_GROUPS.find(a => a.id === ageGroupId);
      
      const record = {
        disease: diseaseId,
        diseaseName: disease.name,
        ageGroup: ageGroupId,
        ageLabel: ageGroup.label,
        gender: genderId,
        date: selectedDate.toISOString().split('T')[0],
        week: getWeekNumber(selectedDate),
        month: selectedDate.getMonth() + 1,
        year: selectedDate.getFullYear(),
        savedAt: Timestamp.now(),
        userId: currentUser.uid
      };

      try {
        const docRef = await addDoc(collection(db, 'daily_records'), record);
        record.id = docRef.id;
        todayRecords.push(record);
        weekRecords.push(record);

        // Update counts
        updateGenderCount(diseaseId, ageGroupId, genderId);
        updateTodayLog();
        updateStats();

        showToast(`✓ زیادکرا`, 'success');
      } catch (error) {
        showToast('هەڵە', 'error');
      }
    };

    window.decrementCount = async function(diseaseId, ageGroupId, genderId) {
      const recordsToDelete = todayRecords
        .filter(r => r.disease === diseaseId && r.ageGroup === ageGroupId && r.gender === genderId)
        .slice(-1);

      if (recordsToDelete.length === 0) return;

      try {
        await deleteDoc(doc(db, 'daily_records', recordsToDelete[0].id));
        todayRecords = todayRecords.filter(r => r.id !== recordsToDelete[0].id);
        weekRecords = weekRecords.filter(r => r.id !== recordsToDelete[0].id);

        updateGenderCount(diseaseId, ageGroupId, genderId);
        updateTodayLog();
        updateStats();

        showToast('✓ سڕایەوە', 'success');
      } catch (error) {
        showToast('هەڵە', 'error');
      }
    };

    function updateGenderCount(diseaseId, ageGroupId, genderId) {
      const count = todayRecords.filter(r => 
        r.disease === diseaseId && r.ageGroup === ageGroupId && r.gender === genderId
      ).length;

      const countEl = document.getElementById(`count-${diseaseId}-${ageGroupId}-${genderId}`);
      if (countEl) countEl.textContent = count;

      // Update total
      const maleCount = todayRecords.filter(r => r.disease === diseaseId && r.ageGroup === ageGroupId && r.gender === 'male').length;
      const femaleCount = todayRecords.filter(r => r.disease === diseaseId && r.ageGroup === ageGroupId && r.gender === 'female').length;
      const totalEl = document.getElementById(`total-${diseaseId}-${ageGroupId}`);
      if (totalEl) totalEl.textContent = maleCount + femaleCount;
    }

    function updateTodayLog() {
      const logList = document.getElementById('todayLogList');
      if (logList) logList.innerHTML = renderTodayLog();
    }

    // Navigation
    window.changeDate = function(delta) {
      selectedDate.setDate(selectedDate.getDate() + delta);
      selectedDisease = null;
      loadData();
    };

    window.exportDaily = function() {
      const csv = convertToCSV(todayRecords);
      downloadFile(csv, `report-${selectedDate.toISOString().split('T')[0]}.csv`);
      showToast('✓ هەناردە کرا', 'success');
    };

    function convertToCSV(records) {
      const headers = ['ڕێکەوت', 'نەخۆشی', 'تەمەن', 'ڕەگەز'];
      const rows = records.map(r => [
        r.date,
        r.diseaseName,
        r.ageLabel,
        r.gender === 'male' ? 'نێر' : 'مێ'
      ]);
      return [headers, ...rows].map(row => row.join(',')).join('\n');
    }

    function downloadFile(content, fileName) {
      const blob = new Blob(['\uFEFF' + content], { type: 'text/csv' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = fileName;
      link.click();
    }

    // Quick Entry Modal
    window.showQuickEntryModal = function() {
      const modal = document.getElementById('modal');
      const modalContent = document.getElementById('modalContent');
      
      modalContent.innerHTML = `
        <h3 style="margin-bottom:12px;color:var(--primary)">⚡ تۆماری خێرا</h3>
        <select id="quickDisease" style="width:100%;padding:10px;margin-bottom:8px;border-radius:8px;border:1px solid var(--border-light)">
          ${DISEASES.map(d => `<option value="${d.id}">${d.icon} ${d.name}</option>`).join('')}
        </select>
        <select id="quickAge" style="width:100%;padding:10px;margin-bottom:8px;border-radius:8px;border:1px solid var(--border-light)">
          ${AGE_GROUPS.map(a => `<option value="${a.id}">${a.label} ${a.sub}</option>`).join('')}
        </select>
        <select id="quickGender" style="width:100%;padding:10px;margin-bottom:8px;border-radius:8px;border:1px solid var(--border-light)">
          <option value="male">👨 نێر</option>
          <option value="female">👩 مێ</option>
        </select>
        <input type="number" id="quickCount" value="1" min="1" max="10" style="width:100%;padding:10px;margin-bottom:12px;border-radius:8px;border:1px solid var(--border-light)">
        <div style="display:flex;gap:8px">
          <button class="action-btn primary" style="flex:1" onclick="quickAddRecords()">زیادکردن</button>
          <button class="action-btn" style="flex:1" onclick="closeModal()">داخستن</button>
        </div>
      `;
      
      modal.classList.add('show');
    };

    window.quickAddRecords = function() {
      const disease = document.getElementById('quickDisease').value;
      const age = document.getElementById('quickAge').value;
      const gender = document.getElementById('quickGender').value;
      const count = parseInt(document.getElementById('quickCount').value);

      for (let i = 0; i < count; i++) {
        addRecord(disease, age, gender);
      }
      closeModal();
    };

    window.closeModal = function() {
      document.getElementById('modal').classList.remove('show');
    };

    // Auth
    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      if (!user) {
        login();
      } else {
        loadData();
      }
    });

    // Make functions global
    window.login = login;
    window.addRecord = addRecord;
    window.decrementCount = decrementCount;
    window.selectDisease = selectDisease;
    window.changeDate = changeDate;
    window.exportDaily = exportDaily;
    window.showQuickEntryModal = showQuickEntryModal;
    window.quickAddRecords = quickAddRecords;
    window.closeModal = closeModal;

    // Initial render
    renderDailyPage();
  </script>
</body>
</html>
