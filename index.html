<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <meta name="theme-color" content="#0f6e56">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>تۆماری نەخۆشی - وەزارەتی تەندروستی</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #0f6e56;
      --primary-dark: #0a4d3b;
      --primary-light: #e1f5ee;
      --male: #185fa5;
      --male-light: #e6f1fb;
      --female: #b33a6a;
      --female-light: #fde8f0;
      --danger: #a32d2d;
      --danger-light: #fcebeb;
      --warning: #ba8e17;
      --success: #2d7a4b;
      --bg-main: #ffffff;
      --bg-secondary: #f8f7f4;
      --text-primary: #1c1c1a;
      --text-secondary: #5f5e5a;
      --text-tertiary: #9e9c97;
      --border-light: rgba(0,0,0,0.08);
      --border-medium: rgba(0,0,0,0.15);
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 12px;
      --spacing-lg: 16px;
      --spacing-xl: 20px;
    }

    [data-theme="dark"] {
      --bg-main: #1a1a18;
      --bg-secondary: #242422;
      --text-primary: #eeeee6;
      --text-secondary: #b4b2a9;
      --border-light: rgba(255,255,255,0.08);
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg-main);
      color: var(--text-primary);
      line-height: 1.4;
    }

    #app {
      max-width: 100%;
      margin: 0;
      padding: var(--spacing-sm);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Header */
    .app-header {
      background: var(--primary);
      color: white;
      padding: var(--spacing-md);
      border-radius: var(--radius-lg);
      margin-bottom: var(--spacing-md);
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow-sm);
    }

    .app-title {
      font-size: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .app-date {
      font-size: 13px;
      background: rgba(255,255,255,0.2);
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* Navigation */
    .nav-scroll {
      display: flex;
      overflow-x: auto;
      gap: 6px;
      padding: 4px 0 12px 0;
      margin-bottom: 4px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .nav-scroll::-webkit-scrollbar {
      display: none;
    }

    .nav-item {
      background: var(--bg-secondary);
      border: 1px solid var(--border-light);
      border-radius: 30px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.2s;
    }

    .nav-item.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* Stats Row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      margin-bottom: var(--spacing-md);
    }

    .stat-box {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 6px 2px;
      text-align: center;
      border: 1px solid var(--border-light);
    }

    .stat-value {
      font-size: 16px;
      font-weight: 800;
      color: var(--primary);
    }

    .stat-label {
      font-size: 9px;
      color: var(--text-secondary);
    }

    /* Disease Grid */
    .disease-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
      margin-bottom: var(--spacing-md);
    }

    .disease-card {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 8px 4px;
      border: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .disease-card.active {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .disease-icon {
      font-size: 20px;
      width: 32px;
      height: 32px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .disease-info {
      flex: 1;
    }

    .disease-name {
      font-size: 12px;
      font-weight: 600;
    }

    .disease-count {
      font-size: 10px;
      color: var(--text-secondary);
    }

    .disease-badge {
      background: var(--primary);
      color: white;
      padding: 2px 6px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 700;
      margin-right: 4px;
    }

    /* Age Section */
    .age-section {
      background: white;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-light);
      padding: var(--spacing-sm);
      margin-bottom: var(--spacing-md);
      animation: fadeIn 0.2s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .selected-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 8px;
      margin-bottom: 8px;
      border-bottom: 2px solid var(--primary-light);
    }

    .selected-icon {
      font-size: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--primary-light);
    }

    .selected-info h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--primary);
    }

    .close-btn {
      margin-right: auto;
      background: none;
      border: none;
      font-size: 20px;
      color: var(--text-secondary);
      padding: 4px 8px;
      cursor: pointer;
    }

    .age-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
    }

    .age-item {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-light);
      overflow: hidden;
    }

    .age-header {
      background: var(--bg-secondary);
      padding: 4px 2px;
      text-align: center;
      border-bottom: 1px solid var(--border-light);
    }

    .age-label {
      font-weight: 700;
      font-size: 12px;
    }

    .age-sub {
      font-size: 8px;
      color: var(--text-secondary);
    }

    .gender-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 6px;
      border-bottom: 1px solid var(--border-light);
    }

    .gender-row:last-child {
      border-bottom: none;
    }

    .gender-badge {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .gender-icon {
      font-size: 14px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gender-icon.male {
      background: var(--male-light);
      color: var(--male);
    }

    .gender-icon.female {
      background: var(--female-light);
      color: var(--female);
    }

    .gender-count {
      font-size: 14px;
      font-weight: 700;
      min-width: 24px;
      text-align: center;
    }

    .gender-controls {
      display: flex;
      gap: 2px;
    }

    .ctrl-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1px solid var(--border-light);
      background: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      transition: all 0.2s;
    }

    .ctrl-btn:active {
      transform: scale(0.9);
      background: var(--primary-light);
    }

    .ctrl-btn.delete:active {
      background: var(--danger);
      color: white;
    }

    .age-total {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 8px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-light);
      font-size: 11px;
      font-weight: 600;
    }

    .total-value {
      color: var(--primary);
      font-size: 13px;
    }

    /* Dashboard */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .dashboard-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: 16px 8px;
      border: 1px solid var(--border-light);
      text-align: center;
    }

    .dashboard-icon {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .dashboard-value {
      font-size: 24px;
      font-weight: 800;
      color: var(--primary);
    }

    .dashboard-label {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* Week Stats */
    .week-stats {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 16px;
      overflow-x: auto;
    }

    .week-day {
      background: white;
      border-radius: var(--radius-md);
      padding: 8px 4px;
      text-align: center;
      border: 1px solid var(--border-light);
      min-width: 60px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .week-day:hover {
      background: var(--primary-light);
      transform: scale(1.02);
    }

    .week-day.has-data {
      background: var(--primary-light);
      font-weight: 700;
    }

    .week-day-name {
      font-size: 11px;
      color: var(--text-secondary);
    }

    .week-day-number {
      font-size: 16px;
      font-weight: 700;
      color: var(--primary);
    }

    .week-day-count {
      font-size: 11px;
      background: var(--primary-light);
      padding: 2px 6px;
      border-radius: 12px;
      margin-top: 4px;
    }

    /* Month Grid */
    .month-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 16px;
    }

    .month-grid .week-day {
      height: 45px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* Summary Card */
    .summary-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: 16px;
      border: 1px solid var(--border-light);
      margin-bottom: 16px;
    }

    /* Report List */
    .report-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .report-item {
      background: white;
      border-radius: var(--radius-md);
      padding: 12px;
      border: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: all 0.2s;
    }

    .report-item:hover {
      background: var(--bg-secondary);
      transform: translateX(-2px);
    }

    .report-info h4 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .report-info p {
      font-size: 11px;
      color: var(--text-secondary);
    }

    .report-icon {
      font-size: 20px;
      color: var(--text-secondary);
      padding: 4px;
      cursor: pointer;
    }

    .report-icon:hover {
      color: var(--primary);
    }

    /* Settings List */
    .settings-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .setting-item {
      background: white;
      border-radius: var(--radius-md);
      padding: 14px;
      border: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: all 0.2s;
    }

    .setting-item:hover {
      background: var(--bg-secondary);
    }

    .setting-label {
      font-weight: 600;
      font-size: 14px;
    }

    .setting-value {
      color: var(--text-secondary);
      font-size: 13px;
    }

    /* Log Section */
    .log-section {
      margin-top: var(--spacing-md);
    }

    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .log-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--primary);
    }

    .log-total {
      background: var(--primary-light);
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      color: var(--primary);
    }

    .log-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 200px;
      overflow-y: auto;
    }

    .log-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      background: white;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-light);
      font-size: 13px;
    }

    .log-item-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .log-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .log-count {
      font-size: 16px;
      font-weight: 700;
      color: var(--primary);
    }

    /* Gender Badges */
    .gender-badge.male, .gender-badge.female {
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      margin-left: 4px;
    }
    
    .gender-badge.male {
      background: var(--male-light);
      color: var(--male);
    }
    
    .gender-badge.female {
      background: var(--female-light);
      color: var(--female);
    }

    /* Bottom Actions */
    .bottom-actions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      margin-top: var(--spacing-md);
      position: sticky;
      bottom: 8px;
      background: var(--bg-main);
      padding: 4px 0;
    }

    .action-btn {
      padding: 8px 4px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-light);
      background: white;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
      transition: all 0.2s;
    }

    .action-btn:active {
      transform: scale(0.95);
    }

    .action-btn.primary {
      background: var(--primary);
      color: white;
      border: none;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--text-primary);
      color: white;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 13px;
      z-index: 9999;
      transition: transform 0.3s;
      box-shadow: var(--shadow-md);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .toast.success {
      background: var(--success);
    }

    .toast.error {
      background: var(--danger);
    }

    /* Modal */
    .modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .modal.show {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: white;
      border-radius: var(--radius-lg);
      padding: 24px;
      width: 90%;
      max-width: 340px;
      max-height: 80vh;
      overflow-y: auto;
    }

    select, input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-light);
      font-family: inherit;
      font-size: 14px;
      background: white;
    }

    /* Chart Placeholder */
    .chart-placeholder {
      background: var(--bg-secondary);
      height: 150px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      font-size: 12px;
      border: 1px dashed var(--border-light);
      margin-bottom: 16px;
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      color: var(--text-secondary);
    }

    /* Utility Classes */
    .text-center { text-align: center; }
    .mt-2 { margin-top: 8px; }
    .mb-2 { margin-bottom: 8px; }
    .p-2 { padding: 8px; }
    .w-100 { width: 100%; }
  </style>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div class="app-header">
      <span class="app-title">🏥 تۆماری نەخۆشی</span>
      <span class="app-date" id="currentDateDisplay"></span>
    </div>

    <!-- Navigation -->
    <div class="nav-scroll" id="navMenu">
      <button class="nav-item active" onclick="changePage('daily')">📋 تۆماری ڕۆژانە</button>
      <button class="nav-item" onclick="changePage('dashboard')">📊 داشبۆرد</button>
      <button class="nav-item" onclick="changePage('weekly')">📅 هەفتانە</button>
      <button class="nav-item" onclick="changePage('monthly')">📈 مانگانە</button>
      <button class="nav-item" onclick="changePage('analytics')">🔍 شیکردنەوە</button>
      <button class="nav-item" onclick="changePage('reports')">📋 ڕاپۆرتەکان</button>
      <button class="nav-item" onclick="changePage('settings')">⚙️ ڕێکخستن</button>
    </div>

    <!-- Stats Row -->
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-value" id="todayTotal">٠</div>
        <div class="stat-label">ئەمڕۆ</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="weekTotal">٠</div>
        <div class="stat-label">هەفتە</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="monthTotal">٠</div>
        <div class="stat-label">مانگ</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="yearTotal">٠</div>
        <div class="stat-label">ساڵ</div>
      </div>
    </div>

    <!-- Main Content -->
    <div id="mainContent"></div>

    <!-- Bottom Actions -->
    <div class="bottom-actions" id="bottomActions">
      <button class="action-btn" onclick="changeDate(-1)">‹ پێشوو</button>
      <button class="action-btn" onclick="changeDate(1)">داهاتوو ›</button>
      <button class="action-btn primary" onclick="showQuickEntryModal()">⚡ خێرا</button>
      <button class="action-btn" onclick="exportCurrent()">📥 هەناردە</button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-content" id="modalContent"></div>
  </div>

    const AGE_GROUPS = [

    // Helper Functions
    function formatDate(date) {
      const months = ['١', '٢', '٣', '٤', '٥', '٦', '٧', '٨', '٩', '١٠', '١١', '١٢'];
      return `${date.getDate()}/${months[date.getMonth()]}/${date.getFullYear()}`;
    }

    function formatDateLong(date) {
      const months = [
        'کانوونی دووەم', 'شوبات', 'ئازار', 'نیسان', 'ئایار', 'حوزەیران',
        'تەممووز', 'ئاب', 'ئەیلوول', 'تشرینی یەکەم', 'تشرینی دووەم', 'کانوونی یەکەم'
      ];
      return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
    }

    function getWeekNumber(date) {
      const firstDayOfYear = new Date(date.getFullYear(), 0, 1);
      const pastDays = (date - firstDayOfYear) / 86400000;
      return Math.ceil((pastDays + firstDayOfYear.getDay() + 1) / 7);
    }

    function getFirstDayOfWeek(date) {
      const day = date.getDay(); // 0 = یەکشەممە, 6 = شەممە
      const diff = day === 6 ? 0 : day + 1; // ڕاستکردنەوە بۆ شەممە وەک یەکەم ڕۆژ
      const firstDay = new Date(date);
      firstDay.setDate(date.getDate() - diff);
      return firstDay;
    }

    function showToast(msg, type = 'info') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `toast show ${type}`;
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

        <div style="display:flex;gap:8px;margin-top:16px">
          <button class="action-btn primary" style="flex:1" onclick="closeModal()">داخستن</button>
        </div>

      modal.classList.add('show');
    }

    }

    // Load Data from Firebase
    async function loadData() {
      if (!currentUser) return;
      
      try {
        // Load today's records
        const todayStr = selectedDate.toISOString().split('T')[0];
        const todayQuery = query(
          collection(db, 'daily_records'), 
          where('date', '==', todayStr)
        );
        const todaySnapshot = await getDocs(todayQuery);
        todayRecords = todaySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

        // Load week records
        const weekNum = getWeekNumber(selectedDate);
        const weekQuery = query(
          collection(db, 'daily_records'),
          where('week', '==', weekNum),
          where('year', '==', selectedDate.getFullYear())
        );
        const weekSnapshot = await getDocs(weekQuery);
        weekRecords = weekSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

        // Load month records
        const monthQuery = query(
          collection(db, 'daily_records'),
          where('month', '==', selectedDate.getMonth() + 1),
          where('year', '==', selectedDate.getFullYear())
        );
        const monthSnapshot = await getDocs(monthQuery);
        monthRecords = monthSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

        // Load saved reports
        await loadSavedReports();

        updateStats();
        renderPage();
      } catch (error) {
        console.error('Error loading data:', error);
        showToast('هەڵە لە بارکردنی داتا', 'error');
      }
    }

    async function loadSavedReports() {
      if (!currentUser) return;
      
      try {
        const reportsQuery = query(
          collection(db, 'saved_reports'),
          where('userId', '==', currentUser.uid),
          orderBy('createdAt', 'desc')
        );
        const reportsSnapshot = await getDocs(reportsQuery);
        savedReports = reportsSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      } catch (error) {
        console.error('Error loading reports:', error);
        savedReports = [];
      }
    }

    function renderTodayLog() {
      if (todayRecords.length === 0) {
        return '<div class="text-center" style="padding:30px;color:var(--text-secondary)">هیچ تۆمارێک نیە</div>';
      }

      // Group records by disease, age, and gender
      const grouped = {};
      todayRecords.forEach(record => {
        const key = `${record.disease}-${record.ageGroup}-${record.gender}`;
        if (!grouped[key]) {
          grouped[key] = {
            disease: DISEASES.find(d => d.id === record.disease),
            ageGroup: AGE_GROUPS.find(a => a.id === record.ageGroup),
            gender: record.gender,
            count: 0
          };
        }
        grouped[key].count++;
      });

      return Object.values(grouped).map(group => `
        <div class="log-item">
          <div class="log-item-info">
            <span class="log-dot" style="background:${group.disease.color}"></span>
            <span>${group.disease.icon} ${group.disease.name}</span>

            <span>${group.ageGroup.label}</span>

    }

    function renderWeeklyPage() {
      const weekDays = ['شەممە', 'یەکشەممە', 'دووشەممە', 'سێشەممە', 'چوارشەممە', 'پێنجشەممە', 'هەینی'];
      const firstDayOfWeek = getFirstDayOfWeek(selectedDate);
      
      let weekHtml = '<div class="week-stats">';
      let totalWeek = 0;
      
      for (let i = 0; i < 7; i++) {
        const date = new Date(firstDayOfWeek);
        date.setDate(firstDayOfWeek.getDate() + i);
        const dateStr = date.toISOString().split('T')[0];
        
        const dayRecords = weekRecords.filter(r => r.date === dateStr);
        const dayTotal = dayRecords.length;
        totalWeek += dayTotal;
        
        weekHtml += `
          <div class="week-day ${dayTotal > 0 ? 'has-data' : ''}" onclick="showDayDetails('${dateStr}')">
            <div class="week-day-name">${weekDays[i]}</div>
            <div class="week-day-number">${date.getDate()}</div>
            ${dayTotal > 0 ? `<div class="week-day-count">${dayTotal}</div>` : ''}
          </div>
        `;
      }
      weekHtml += '</div>';

      // کۆکردنەوەی نەخۆشییەکان
      const diseaseStats = {};
      weekRecords.forEach(record => {
        if (!diseaseStats[record.disease]) {
          diseaseStats[record.disease] = {
            disease: DISEASES.find(d => d.id === record.disease),
            male: 0,
            female: 0,
            total: 0
          };
        }
        diseaseStats[record.disease].total++;
        if (record.gender === 'male') diseaseStats[record.disease].male++;
        else diseaseStats[record.disease].female++;
      });

      return `
        <div class="summary-card">
          <h4 style="margin-bottom:8px">📊 پوختەی هەفتە</h4>
          <p>کۆی گشتی: <strong>${totalWeek}</strong> حاڵەت</p>
          <p>تێکڕای ڕۆژانە: <strong>${Math.round(totalWeek / 7)}</strong></p>

            disease: DISEASES.find(d => d.id === record.disease),

      return monthHtml + `

            <div class="dashboard-icon">👩</div>
            <div class="dashboard-value">${femaleCount}</div>
            <div class="dashboard-label">مێ ${femalePercent}%</div>
          </div>
        </div>

        <div class="summary-card">
          <h4 style="margin-bottom:12px">🔝 پێنج نەخۆشی باو</h4>
          <div class="log-list">
            ${topDiseases.map((disease, index) => `
              <div class="log-item">
                <div class="log-item-info">
                  <span style="width:24px;font-weight:700">#${index+1}</span>
                  <span class="log-dot" style="background:${disease.disease.color}"></span>
                  <span>${disease.disease.icon} ${disease.disease.name}</span>
                </div>
                <span class="log-count">${disease.count}</span>
              </div>
            `).join('')}
          </div>
        </div>

        <div class="summary-card">
          <h4 style="margin-bottom:12px">📊 پێکهاتەی تەمەنەکان</h4>
          <div class="log-list">
            ${AGE_GROUPS.map(age => {
              const count = recentRecords.filter(r => r.ageGroup === age.id).length;
              if (count === 0) return '';
              const percentage = total > 0 ? Math.round(count/total*100) : 0;
              return `
                <div class="log-item">
                  <span>${age.label} ${age.sub}</span>
                  <span class="log-count">${count} (${percentage}%)</span>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }

    function renderReportsPage() {
      return `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <h3 style="color:var(--primary)">📋 ڕاپۆرتە پاشەکەوتکراوەکان</h3>
          <button class="action-btn primary" onclick="createNewReport()" style="padding:8px 12px">
            <span>➕ نوێ</span>
          </button>
        </div>

        <div class="report-list" id="reportsList">
          ${savedReports.length === 0 ? `
            <div style="text-align:center;padding:40px;color:var(--text-secondary)">
              <span style="font-size:48px;display:block;margin-bottom:16px">📭</span>
              <p>هیچ ڕاپۆرتێک پاشەکەوت نەکراوە</p>
              <button class="action-btn primary" onclick="createNewReport()" style="margin-top:16px;padding:12px 24px">
                دروستکردنی یەکەم ڕاپۆرت
              </button>
            </div>
          ` : savedReports.map(report => `
            <div class="report-item">
              <div class="report-info" onclick="viewReport('${report.id}')">
                <h4>${report.title || 'ڕاپۆرت'}</h4>
                <p>${report.date || formatDate(new Date())} · ${report.count || 0} تۆمار</p>
              </div>
              <div style="display:flex;gap:8px">
                <span class="report-icon" onclick="downloadReport('${report.id}')">📥</span>
                <span class="report-icon" onclick="deleteReport('${report.id}')">🗑️</span>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderSettingsPage() {
      const settings = JSON.parse(localStorage.getItem('appSettings')) || {
        theme: 'light',
        language: 'ku',
        notifications: true,
        sound: true
      };

      return `
        <div class="settings-list">
          <div class="setting-item">
            <span class="setting-label">👤 ناوی بەکارهێنەر</span>
            <span class="setting-value">${currentUser?.displayName || 'بەکارهێنەر'}</span>
          </div>
          <div class="setting-item">
            <span class="setting-label">📧 ئیمەیل</span>
            <span class="setting-value">${currentUser?.email || '-'}</span>
          </div>
          
          <div class="setting-item" onclick="toggleSetting('theme')">
            <span class="setting-label">🌙 ڕەنگی ڕووکار</span>
            <span class="setting-value">${settings.theme === 'dark' ? 'تاریک' : 'ڕووناک'}</span>
          </div>
          
          <div class="setting-item" onclick="toggleSetting('notifications')">
            <span class="setting-label">🔔 ئاگادارکردنەوە</span>
            <span class="setting-value">${settings.notifications ? 'چالاک' : 'ناچالاک'}</span>
          </div>
          
          <div class="setting-item" onclick="toggleSetting('sound')">
            <span class="setting-label">🔊 دەنگ</span>
            <span class="setting-value">${settings.sound ? 'چالاک' : 'ناچالاک'}</span>
          </div>
          
          <div class="setting-item" onclick="exportAllData()">
            <span class="setting-label">📤 هەناردەی هەموو داتاکان</span>
            <span class="setting-value">⬇️</span>
          </div>
          
          <div class="setting-item" onclick="showBackupOptions()">
            <span class="setting-label">💾 پشتیوانی</span>
            <span class="setting-value">↻</span>
          </div>
          
          <div class="setting-item" style="color:var(--danger)" onclick="logout()">
            <span class="setting-label">🚪 دەرچوون</span>
            <span class="setting-value"></span>
          </div>
        </div>
      `;
    }

    // Actions
    window.selectDisease = function(diseaseId) {
      selectedDisease = diseaseId;
      renderPage();
    };

    window.addRecord = async function(diseaseId, ageGroupId, genderId) {
      if (!currentUser) {
        showToast('سەرەتا بچۆرە ژوورەوە', 'error');
        return;
      }

      const disease = DISEASES.find(d => d.id === diseaseId);
      const ageGroup = AGE_GROUPS.find(a => a.id === ageGroupId);
      
      const record = {
        disease: diseaseId,
        diseaseName: disease.name,
        ageGroup: ageGroupId,
        ageLabel: ageGroup.label,
        gender: genderId,
        date: selectedDate.toISOString().split('T')[0],
        week: getWeekNumber(selectedDate),
        month: selectedDate.getMonth() + 1,
        year: selectedDate.getFullYear(),
        savedAt: Timestamp.now(),
        userId: currentUser.uid,
        userName: currentUser.displayName
      };

      try {
        const docRef = await addDoc(collection(db, 'daily_records'), record);
        record.id = docRef.id;
        todayRecords.push(record);
        weekRecords.push(record);
        monthRecords.push(record);

        updateGenderCount(diseaseId, ageGroupId, genderId);
        updateStats();
        renderPage();

        showToast(`✓ زیادکرا`, 'success');
      } catch (error) {
        console.error('Error adding record:', error);
        showToast('هەڵە لە تۆمارکردن', 'error');
      }
    };

    window.decrementCount = async function(diseaseId, ageGroupId, genderId) {
      const recordsToDelete = todayRecords
        .filter(r => r.disease === diseaseId && r.ageGroup === ageGroupId && r.gender === genderId)
        .slice(-1);

      if (recordsToDelete.length === 0) return;

      try {
        await deleteDoc(doc(db, 'daily_records', recordsToDelete[0].id));
        
        todayRecords = todayRecords.filter(r => r.id !== recordsToDelete[0].id);
        weekRecords = weekRecords.filter(r => r.id !== recordsToDelete[0].id);
        monthRecords = monthRecords.filter(r => r.id !== recordsToDelete[0].id);

        updateGenderCount(diseaseId, ageGroupId, genderId);
        updateStats();
        renderPage();

        showToast('✓ سڕایەوە', 'success');
      } catch (error) {
        console.error('Error deleting record:', error);
        showToast('هەڵە لە سڕینەوە', 'error');
      }
    };

    function updateGenderCount(diseaseId, ageGroupId, genderId) {
      const count = todayRecords.filter(r => 
        r.disease === diseaseId && r.ageGroup === ageGroupId && r.gender === genderId
      ).length;

      const countEl = document.getElementById(`count-${diseaseId}-${ageGroupId}-${genderId}`);
      if (countEl) countEl.textContent = count;

      const maleCount = todayRecords.filter(r => r.disease === diseaseId && r.ageGroup === ageGroupId && r.gender === 'male').length;
      const femaleCount = todayRecords.filter(r => r.disease === diseaseId && r.ageGroup === ageGroupId && r.gender === 'female').length;
      const totalEl = document.getElementById(`total-${diseaseId}-${ageGroupId}`);
      if (totalEl) totalEl.textContent = maleCount + femaleCount;
    }

    // Navigation
    window.changePage = function(page) {
      currentPage = page;
      selectedDisease = null;
      
      document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
      event.currentTarget.classList.add('active');
      
      renderPage();
    };

    window.changeDate = function(delta) {
      selectedDate.setDate(selectedDate.getDate() + delta);
      selectedDisease = null;
      loadData();
    };

    // Export Functions
    window.exportCurrent = function() {
      let records = [];
      let fileName = '';
      
      if (currentPage === 'daily') {
        records = todayRecords;
        fileName = `daily-${selectedDate.toISOString().split('T')[0]}.csv`;
      } else if (currentPage === 'weekly') {
        records = weekRecords;
        fileName = `weekly-${getWeekNumber(selectedDate)}-${selectedDate.getFullYear()}.csv`;
      } else if (currentPage === 'monthly') {
        records = monthRecords;
        fileName = `monthly-${selectedDate.getMonth()+1}-${selectedDate.getFullYear()}.csv`;
      } else {
        records = todayRecords;
        fileName = `export-${Date.now()}.csv`;
      }
      
      const csv = convertToCSV(records);
      downloadFile(csv, fileName);
      showToast('✓ هەناردە کرا', 'success');
    };

    window.exportAllData = function() {
      // ئەمە هەموو داتاکان هەناردە دەکات
      showToast('بەم زووانە', 'info');
    };

    function convertToCSV(records) {
      const headers = ['ڕێکەوت', 'نەخۆشی', 'تەمەن', 'ڕەگەز', 'کات'];
      const rows = records.map(r => [
        r.date,
        r.diseaseName,
        r.ageLabel,
        r.gender === 'male' ? 'نێر' : 'مێ',
        r.savedAt?.toDate?.().toLocaleTimeString('ku') || ''
      ]);
      return [headers, ...rows].map(row => row.join(',')).join('\n');
    }

    function downloadFile(content, fileName) {
      const blob = new Blob(['\uFEFF' + content], { type: 'text/csv' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = fileName;
      link.click();
    }

    // Day Details
    window.showDayDetails = function(dateStr) {
      const allRecords = [...todayRecords, ...weekRecords, ...monthRecords];
      const dayRecords = allRecords.filter(r => r.date === dateStr);
      
      if (dayRecords.length === 0) {
        showToast('هیچ تۆمارێک نیە', 'info');
        return;
      }
      
      const date = new Date(dateStr);
      const formattedDate = formatDateLong(date);
      
      let detailsHtml = `<h3 style="margin-bottom:12px">📋 وردەکاری ${formattedDate}</h3>`;
      detailsHtml += `<p style="margin-bottom:16px">کۆی گشتی: <strong>${dayRecords.length}</strong> حاڵەت</p>`;
      
      // کۆکردنەوە بەپێی نەخۆشی
      const diseaseStats = {};
      dayRecords.forEach(record => {
        if (!diseaseStats[record.disease]) {
          diseaseStats[record.disease] = {
            disease: DISEASES.find(d => d.id === record.disease),
            male: 0,
            female: 0
          };
        }
        if (record.gender === 'male') diseaseStats[record.disease].male++;
        else diseaseStats[record.disease].female++;
      });
      
      detailsHtml += '<div style="margin-top:8px">';
      Object.values(diseaseStats).forEach(stat => {
        detailsHtml += `
          <div style="display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid var(--border-light)">
            <span><span class="log-dot" style="background:${stat.disease.color};display:inline-block;margin-left:6px"></span> ${stat.disease.icon} ${stat.disease.name}</span>
            <span>
              <span style="color:var(--male);margin-left:8px">👨 ${stat.male}</span>
              <span style="color:var(--female)">👩 ${stat.female}</span>
            </span>
          </div>
        `;
      });
      detailsHtml += '</div>';
      
      showModal('وردەکاری ڕۆژ', detailsHtml);
    };

    // Report Functions
    window.createNewReport = function() {
      const reportTypes = [
        { id: 'daily', name: 'ڕاپۆرتی ڕۆژانە', icon: '📋' },
        { id: 'weekly', name: 'ڕاپۆرتی هەفتانە', icon: '📅' },
        { id: 'monthly', name: 'ڕاپۆرتی مانگانە', icon: '📈' },
        { id: 'custom', name: 'ڕاپۆرتی تایبەت', icon: '⚙️' }
      ];
      
      showModal('دروستکردنی ڕاپۆرتی نوێ', `
        <div style="display:grid;gap:8px">
          ${reportTypes.map(type => `
            <button class="action-btn" style="justify-content:flex-start;padding:12px;width:100%" onclick="selectReportType('${type.id}')">
              <span style="font-size:20px;margin-left:10px">${type.icon}</span>
              ${type.name}
            </button>
          `).join('')}
        </div>
      `);
    };

    window.selectReportType = function(type) {
      closeModal();
      
      let records = [];
      let title = '';
      
      if (type === 'daily') {
        records = todayRecords;
        title = `ڕاپۆرتی ڕۆژانە - ${formatDate(selectedDate)}`;
      } else if (type === 'weekly') {
        records = weekRecords;
        title = `ڕاپۆرتی هەفتانە - هەفتەی ${getWeekNumber(selectedDate)}`;
      } else if (type === 'monthly') {
        records = monthRecords;
        title = `ڕاپۆرتی مانگانە - ${selectedDate.getMonth()+1}/${selectedDate.getFullYear()}`;
      }
      
      saveReport(title, records);
    };

    async function saveReport(title, records) {
      if (!currentUser) return;
      
      try {
        const report = {
          title: title,
          date: formatDate(new Date()),
          count: records.length,
          data: records.slice(0, 100), // تەنها ١٠٠ تۆمار هەڵدەگرین بۆ ڕێگری لە قەبارە زۆر
          userId: currentUser.uid,
          createdAt: Timestamp.now()
        };
        
        await addDoc(collection(db, 'saved_reports'), report);
        await loadSavedReports();
        renderPage();
        showToast('✓ ڕاپۆرت پاشەکەوت کرا', 'success');
      } catch (error) {
        console.error('Error saving report:', error);
        showToast('هەڵە لە پاشەکەوتکردن', 'error');
      }
    }

    window.viewReport = function(reportId) {
      const report = savedReports.find(r => r.id === reportId);
      if (!report) return;
      
      let detailsHtml = `<h3 style="margin-bottom:12px">${report.title}</h3>`;
      detailsHtml += `<p style="margin-bottom:16px">ڕێکەوت: ${report.date} | کۆی تۆمار: ${report.count}</p>`;
      
      if (report.data && report.data.length > 0) {
        detailsHtml += '<div class="log-list" style="max-height:300px">';
        
        // کۆکردنەوە بەپێی نەخۆشی
        const diseaseCounts = {};
        report.data.forEach(record => {
          const diseaseName = record.diseaseName || record.disease;
          diseaseCounts[diseaseName] = (diseaseCounts[diseaseName] || 0) + 1;
        });
        
        Object.entries(diseaseCounts).forEach(([disease, count]) => {
          detailsHtml += `
            <div class="log-item">
              <span>${disease}</span>
              <span class="log-count">${count}</span>
            </div>
          `;
        });
        
        detailsHtml += '</div>';
      }
      
      showModal('پیشاندانی ڕاپۆرت', detailsHtml);
    };

    window.downloadReport = function(reportId) {
      const report = savedReports.find(r => r.id === reportId);
      if (!report || !report.data) return;
      
      const csv = convertToCSV(report.data);
      downloadFile(csv, `report-${reportId}.csv`);
      showToast('✓ داونلۆد کرا', 'success');
    };

    window.deleteReport = async function(reportId) {
      if (!confirm('دڵنیایت دەتەوێت ئەم ڕاپۆرتە بسڕیتەوە؟')) return;
      
      try {
        await deleteDoc(doc(db, 'saved_reports', reportId));
        await loadSavedReports();
        renderPage();
        showToast('✓ ڕاپۆرت سڕایەوە', 'success');
      } catch (error) {
        console.error('Error deleting report:', error);
        showToast('هەڵە لە سڕینەوە', 'error');
      }
    };

    // Settings Functions
    window.toggleSetting = function(setting) {
      const settings = JSON.parse(localStorage.getItem('appSettings')) || {
        theme: 'light',
        notifications: true,
        sound: true
      };
      
      if (setting === 'theme') {
        settings.theme = settings.theme === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', settings.theme);
      } else if (setting === 'notifications') {
        settings.notifications = !settings.notifications;
      } else if (setting === 'sound') {
        settings.sound = !settings.sound;
      }
      
      localStorage.setItem('appSettings', JSON.stringify(settings));
      showToast('✓ ڕێکخستنەکان نوێکرانەوە', 'success');
      renderPage();
    };

    window.showBackupOptions = function() {
      showModal('پشتیوانی', `
        <p style="margin-bottom:16px">داتاکانت لە Firebase پارێزراون</p>
        <button class="action-btn" style="width:100%;margin-bottom:8px" onclick="exportAllData()">📥 هەناردەی هەموو داتاکان</button>
        <button class="action-btn" style="width:100%" onclick="alert('بەم زووانە')">📤 گەڕاندنەوەی داتا</button>
      `);
    };

    // Quick Entry Modal
    window.showQuickEntryModal = function() {
      showModal('⚡ تۆماری خێرا', `
        <select id="quickDisease">
          ${DISEASES.map(d => `<option value="${d.id}">${d.icon} ${d.name}</option>`).join('')}
        </select>
        <select id="quickAge">
          ${AGE_GROUPS.map(a => `<option value="${a.id}">${a.label} ${a.sub}</option>`).join('')}
        </select>
        <select id="quickGender">
          <option value="male">👨 نێر</option>
          <option value="female">👩 مێ</option>
        </select>
        <input type="number" id="quickCount" value="1" min="1" max="10">
        <button class="action-btn primary" style="width:100%;margin-top:8px" onclick="quickAddRecords()">زیادکردن</button>
      `);
    };

    window.quickAddRecords = function() {
      const disease = document.getElementById('quickDisease').value;
      const age = document.getElementById('quickAge').value;
      const gender = document.getElementById('quickGender').value;
      const count = parseInt(document.getElementById('quickCount').value);

      for (let i = 0; i < count; i++) {
        addRecord(disease, age, gender);
      }
      closeModal();
    };

    // Initialize
    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        loadData();
      } else {
        currentUser = null;
        renderPage();
      }
    });

    // Make all functions global
    window.login = login;
    window.logout = logout;
    window.addRecord = addRecord;
    window.decrementCount = decrementCount;
    window.selectDisease = selectDisease;
    window.changePage = changePage;
    window.changeDate = changeDate;
    window.exportCurrent = exportCurrent;
    window.showQuickEntryModal = showQuickEntryModal;
    window.quickAddRecords = quickAddRecords;
    window.closeModal = closeModal;
    window.showDayDetails = showDayDetails;
    window.createNewReport = createNewReport;
    window.selectReportType = selectReportType;
    window.viewReport = viewReport;
    window.downloadReport = downloadReport;
    window.deleteReport = deleteReport;
    window.toggleSetting = toggleSetting;
    window.showBackupOptions = showBackupOptions;
    window.exportAllData = exportAllData;

    // Initial render
    renderPage();
  </script>
</body>
</html>
