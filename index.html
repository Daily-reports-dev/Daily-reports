<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستەمی ڕاپۆرتی ڕۆژانە</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;400;700&display=swap');
        body { font-family: 'Vazirmatn', sans-serif; background-color: #f3f4f6; }
        .glass-effect { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        /* چاککردنی خشتە بۆ مۆبایل */
        .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        @media (max-width: 640px) {
            table { font-size: 0.85rem; }
            th, td { padding: 8px 4px !important; }
        }
    </style>
</head>
<body class="min-h-screen bg-gray-100">

    <div class="max-w-6xl mx-auto p-4 lg:p-8">
        
        <header class="flex justify-between items-center mb-8 bg-white p-4 rounded-2xl shadow-sm">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-3 rounded-xl text-white">
                    <i class="fas fa-file-medical text-2xl"></i>
                </div>
                <h1 class="text-xl font-bold text-gray-800">ڕاپۆرتی ڕۆژانە</h1>
            </div>
            <div id="auth-section">
                <button id="login-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-xl transition-all flex items-center gap-2">
                    <i class="fab fa-google"></i> چوونەژوورەوە
                </button>
                <div id="user-info" class="hidden flex items-center gap-3">
                    <span id="user-name" class="text-sm font-medium text-gray-700"></span>
                    <img id="user-pic" class="w-10 h-10 rounded-full border-2 border-blue-100" src="" alt="">
                    <button id="logout-btn" class="text-red-500 hover:text-red-700 p-2"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </header>

        <div id="main-content" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-2xl shadow-sm sticky top-8">
                    <h2 class="text-lg font-bold mb-6 flex items-center gap-2 text-gray-700 border-b pb-2">
                        <i class="fas fa-plus-circle text-blue-500"></i> تۆمارکردنی نوێ
                    </h2>
                    <form id="report-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-1">ناوی نەخۆش</label>
                            <input type="text" id="patient-name" required class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-1">جۆری نەخۆشی</label>
                            <input type="text" id="disease-type" required class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-1">تێبینییەکان</label>
                            <textarea id="notes" rows="3" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all"></textarea>
                        </div>
                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-200 transition-all active:scale-95">
                            <i class="fas fa-save ml-2"></i> پاشەکەوتکردن
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white p-6 rounded-2xl shadow-sm min-h-[500px]">
                    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                        <h2 class="text-lg font-bold text-gray-700 flex items-center gap-2">
                            <i class="fas fa-list-ul text-blue-500"></i> دوایین تۆمارەکان
                        </h2>
                        <div class="relative w-full md:w-64">
                            <i class="fas fa-search absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="search-input" placeholder="گەڕان بەپێی ناو..." class="w-full pr-10 pl-4 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>

                    <div class="table-container">
                        <table class="w-full text-right border-collapse">
                            <thead>
                                <tr class="bg-gray-50 text-gray-600 uppercase text-xs">
                                    <th class="p-4 rounded-r-xl">بەروار</th>
                                    <th class="p-4">ناوی نەخۆش</th>
                                    <th class="p-4">جۆری نەخۆشی</th>
                                    <th class="p-4 rounded-l-xl">کردار</th>
                                </tr>
                            </thead>
                            <tbody id="reports-list" class="divide-y divide-gray-100">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div id="login-message" class="text-center py-20 bg-white rounded-3xl shadow-sm">
            <i class="fas fa-lock text-6xl text-gray-200 mb-6"></i>
            <h2 class="text-2xl font-bold text-gray-700 mb-2">بەخێربێیت بۆ سیستەمی ڕاپۆرت</h2>
            <p class="text-gray-500">تکایە سەرەتا بچۆرە ژوورەوە بۆ ئەوەی بتوانیت داتاکان ببینی و تۆمار بکەیت.</p>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ڕێکخستنی فایەربەیس
        const firebaseConfig = {
            apiKey: "AIzaSyByTfV5D4V0Vf...", // لێرە کلیلی خۆت دانابوو، من کورتم کردۆتەوە بۆ پاراستنی کۆدەکە
            authDomain: "daily-reports-5d85d.firebaseapp.com",
            projectId: "daily-reports-5d85d",
            storageBucket: "daily-reports-5d85d.appspot.com",
            messagingSenderId: "587023317765",
            appId: "1:587023317765:web:8662400c014798e4d35e16"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // توخمەکانی HTML
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const authSection = document.getElementById('auth-section');
        const userInfo = document.getElementById('user-info');
        const mainContent = document.getElementById('main-content');
        const loginMessage = document.getElementById('login-message');
        const reportForm = document.getElementById('report-form');
        const reportsList = document.getElementById('reports-list');
        const searchInput = document.getElementById('search-input');

        // چوونەژوورەوە
        loginBtn.onclick = () => signInWithPopup(auth, provider);
        logoutBtn.onclick = () => signOut(auth);

        // چاودێریکردنی باری بەکارهێنەر
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginBtn.classList.add('hidden');
                userInfo.classList.remove('hidden');
                mainContent.classList.remove('hidden');
                loginMessage.classList.add('hidden');
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-pic').src = user.photoURL;
                loadReports();
            } else {
                loginBtn.classList.remove('hidden');
                userInfo.classList.add('hidden');
                mainContent.classList.add('hidden');
                loginMessage.classList.remove('hidden');
            }
        });

        // ناردنی ڕاپۆرت
        reportForm.onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('patient-name').value;
            const type = document.getElementById('disease-type').value;
            const notes = document.getElementById('notes').value;

            try {
                await addDoc(collection(db, "daily_records"), {
                    patientName: name,
                    diseaseType: type,
                    notes: notes,
                    createdAt: new Date(),
                    userId: auth.currentUser.uid
                });
                reportForm.reset();
                alert("بە سەرکەوتوویی پاشەکەوت کرا!");
            } catch (error) {
                console.error("Error adding document: ", error);
            }
        };

        // خوێندنەوەی ڕاپۆرتەکان بە شێوەی ڕاستەوخۆ (Real-time)
        function loadReports() {
            const q = query(collection(db, "daily_records"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                let html = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const date = data.createdAt ? data.createdAt.toDate().toLocaleDateString('ku-IQ') : 'بەردەست نییە';
                    html += `
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="p-4 text-xs text-gray-500">${date}</td>
                            <td class="p-4 font-medium text-gray-800">${data.patientName}</td>
                            <td class="p-4 text-gray-600">${data.diseaseType}</td>
                            <td class="p-4">
                                <button onclick="deleteReport('${doc.id}')" class="text-red-400 hover:text-red-600 p-2">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
                reportsList.innerHTML = html;
            });
        }

        // سڕینەوەی ڕاپۆرت
        window.deleteReport = async (id) => {
            if(confirm("ئایا دڵنیایت لە سڕینەوەی ئەم تۆمارە؟")) {
                await deleteDoc(doc(db, "daily_records", id));
            }
        };

        // گەڕان لەناو خشتەکەدا
        searchInput.oninput = () => {
            const filter = searchInput.value.toLowerCase();
            const rows = reportsList.getElementsByTagName('tr');
            Array.from(rows).forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(filter) ? "" : "none";
            });
        };
    </script>
</body>
</html>
