<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <meta name="theme-color" content="#0f6e56">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>تۆماری نەخۆشی - وەزارەتی تەندروستی</title>
  
  <!-- CSS فایل -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div class="app-header">
      <span class="app-title">🏥 تۆماری نەخۆشی</span>
      <span class="app-date" id="currentDateDisplay"></span>
    </div>

    <!-- Navigation -->
    <div class="nav-scroll" id="navMenu">
      <button class="nav-item active" onclick="changePage('daily')">📋 تۆماری ڕۆژانە</button>
      <button class="nav-item" onclick="changePage('dashboard')">📊 داشبۆرد</button>
      <button class="nav-item" onclick="changePage('weekly')">📅 هەفتانە</button>
      <button class="nav-item" onclick="changePage('monthly')">📈 مانگانە</button>
      <button class="nav-item" onclick="changePage('analytics')">🔍 شیکردنەوە</button>
      <button class="nav-item" onclick="changePage('reports')">📋 ڕاپۆرتەکان</button>
      <button class="nav-item" onclick="changePage('settings')">⚙️ ڕێکخستن</button>
    </div>

    <!-- Stats Row -->
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-value" id="todayTotal">٠</div>
        <div class="stat-label">ئەمڕۆ</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="weekTotal">٠</div>
        <div class="stat-label">هەفتە</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="monthTotal">٠</div>
        <div class="stat-label">مانگ</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="yearTotal">٠</div>
        <div class="stat-label">ساڵ</div>
      </div>
    </div>

    <!-- Main Content -->
    <div id="mainContent"></div>

    <!-- Bottom Actions -->
    <div class="bottom-actions" id="bottomActions">
      <button class="action-btn" onclick="changeDate(-1)">‹ پێشوو</button>
      <button class="action-btn" onclick="changeDate(1)">داهاتوو ›</button>
      <button class="action-btn primary" onclick="showQuickEntryModal()">⚡ خێرا</button>
      <button class="action-btn" onclick="exportCurrent()">📥 هەناردە</button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-content" id="modalContent"></div>
  </div>

  <!-- JavaScript فایل -->
  <script type="module" src="app.js"></script>
</body>
</html>
